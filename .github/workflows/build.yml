name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5.1'

    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace

    - name: Build Release APK
      run: gradle assembleRelease --stacktrace

    - name: List APK files
      id: apk_info
      run: |
        echo "DATE=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_OUTPUT
        echo "=== APK files ==="
        find app/build/outputs -name "*.apk" -type f 2>/dev/null
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug not found"
        ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "Release not found"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.3.0-${{ steps.apk_info.outputs.DATE }}
        name: "Security Scanner v1.3.0 - ${{ steps.apk_info.outputs.DATE }}"
        body: |
          ## Android Security Scanner v1.3.0

          ### Fix:
          - Fix loi tao chung chi CA (WRONG_TAG ASN.1) - certificate generation hoat dong chinh xac
          - Fix loi khong tat duoc VPN - toggle VPN bat/tat binh thuong
          - Cai tien Live Monitor: nhom traffic theo ten app, hien thi URL day du
          - Bat duoc toan bo HTTP/HTTPS, WebView, web browsing, video URLs
          - Hien thi content-type (JPEG, PNG, HTML, JSON, Video...) cho binary data

          ### Tinh nang:
          - Quet virus, adware, spyware
          - Theo doi hoat dong mang cua tat ca app
          - LIVE Traffic Monitor - theo doi traffic realtime qua VPN
          - Nhom traffic theo app name/package (giao dien gọn gang)
          - Cai chung chi CA de giai ma HTTPS
          - Ho tro Android 8+ (API 26+)

          ### Huong dan:
          1. Tai file APK (app-debug.apk)
          2. Bat "Cai dat tu nguon khong xac dinh"
          3. Cai dat APK
          4. Cap quyen "Usage Access"
          5. Nhan "Quet bao mat" de quet
          6. Nhan "Live Monitor" de theo doi traffic realtime
          7. Nhan "Cai Chung Chi" de cai CA cert cho HTTPS
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create gradle wrapper
      run: |
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-7.5.1-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    - name: Install Gradle
      run: |
        wget -q https://services.gradle.org/distributions/gradle-7.5.1-bin.zip
        unzip -q gradle-7.5.1-bin.zip
        export PATH=$PWD/gradle-7.5.1/bin:$PATH
        gradle wrapper --gradle-version 7.5.1

    - name: Build Debug APK
      run: |
        export PATH=$PWD/gradle-7.5.1/bin:$PATH
        gradle assembleDebug

    - name: Build Release APK
      run: |
        export PATH=$PWD/gradle-7.5.1/bin:$PATH
        gradle assembleRelease

    - name: Sign Release APK
      run: |
        # Generate keystore for signing
        keytool -genkeypair -v \
          -keystore release.keystore \
          -alias securityscanner \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass security123 \
          -keypass security123 \
          -dname "CN=SecurityScanner, OU=Dev, O=SecurityScanner, L=Unknown, ST=Unknown, C=US"

        # Create signing config
        mkdir -p app/signing
        cat > app/signing/signing.properties << 'EOF'
        storeFile=../../release.keystore
        storePassword=security123
        keyAlias=securityscanner
        keyPassword=security123
        EOF

    - name: Get APK info
      id: apk_info
      run: |
        echo "DATE=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_OUTPUT
        ls -la app/build/outputs/apk/debug/
        ls -la app/build/outputs/apk/release/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0-${{ steps.apk_info.outputs.DATE }}
        name: "Security Scanner v1.0.0 - ${{ steps.apk_info.outputs.DATE }}"
        body: |
          ## Android Security Scanner v1.0.0

          ### Tính năng:
          - Theo dõi hoat động mạng (mTim tracking) của tất cả app
          - Quét virus, adware, spyware bằng nhiều phương pháp
          - Phân tích quyền nguy hiểm
          - Phát hiện typo-squatting và giả mạo
          - Kiểm tra chữ ký số
          - Phân tích metadata đáng ngờ
          - Tìm kiếm và lọc theo mức độ đe dọa
          - Hỗ trợ Android 8+ (API 26+)

          ### Hướng dẫn cài đặt:
          1. Tải file APK
          2. Bật "Cài đặt từ nguồn không xác định" trong cài đặt
          3. Cài đặt APK
          4. Cấp quyền "Usage Access" khi app yêu cầu
          5. Nhấn "Quét bảo mật" để bắt đầu

          ### Yêu cầu:
          - Android 8.0 (Oreo) trở lên
          - Quyền Usage Access (bắt buộc)
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5.1'

    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace

    - name: Build Release APK
      run: gradle assembleRelease --stacktrace

    - name: List APK files
      id: apk_info
      run: |
        echo "DATE=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_OUTPUT
        echo "=== APK files ==="
        find app/build/outputs -name "*.apk" -type f 2>/dev/null
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug not found"
        ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "Release not found"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0-${{ steps.apk_info.outputs.DATE }}
        name: "Security Scanner v1.0.0 - ${{ steps.apk_info.outputs.DATE }}"
        body: |
          ## Android Security Scanner v1.0.0

          ### Tính năng:
          - Theo dõi hoat động mạng (mTim tracking) của tất cả app
          - Quét virus, adware, spyware bằng nhiều phương pháp
          - Phân tích quyền nguy hiểm
          - Phát hiện typo-squatting và giả mạo
          - Kiểm tra chữ ký số
          - Phân tích metadata đáng ngờ
          - Tìm kiếm và lọc theo mức độ đe dọa
          - Hỗ trợ Android 8+ (API 26+)

          ### Hướng dẫn cài đặt:
          1. Tải file APK (app-debug.apk)
          2. Bật "Cài đặt từ nguồn không xác định" trong cài đặt
          3. Cài đặt APK
          4. Cấp quyền "Usage Access" khi app yêu cầu
          5. Nhấn "Quét bảo mật" để bắt đầu

          ### Yêu cầu:
          - Android 8.0 (Oreo) trở lên
          - Quyền Usage Access (bắt buộc)
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
